<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Data Dosen Serdos 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        /* LOGIN SCREEN */
        .login-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 40px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .login-container h1 {
            color: #667eea;
            margin-bottom: 30px;
            text-align: center;
        }

        .login-tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
        }

        .login-tabs button {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .login-tabs button.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .login-form {
            display: none;
        }

        .login-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #d3f9d8;
            color: #2b8a3e;
            border-left: 4px solid #51cf66;
        }

        .alert-error {
            background: #ffe3e3;
            color: #c92a2a;
            border-left: 4px solid #ff8787;
        }

        /* MAIN APP */
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 24px;
        }

        .user-info {
            text-align: right;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid white;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #eee;
            background: #f9f9f9;
            flex-wrap: wrap;
        }

        .tab-btn {
            flex: 1;
            padding: 15px 20px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #666;
            border-bottom: 3px solid transparent;
            min-width: 100px;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .content {
            display: none;
            padding: 30px;
        }

        .content.active {
            display: block;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            flex: 1;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
        }

        .card.p1 {
            background: linear-gradient(135deg, #51cf66 0%, #40c057 100%);
        }

        .card.p2 {
            background: linear-gradient(135deg, #ffd43b 0%, #ffb700 100%);
            color: #333;
        }

        .card.followup {
            background: linear-gradient(135deg, #ff8787 0%, #ff6b6b 100%);
        }

        .card h3 {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .card .number {
            font-size: 32px;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }

        th {
            background: #f5f5f5;
            font-weight: 600;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-p1 {
            background: #d3f9d8;
            color: #2b8a3e;
        }

        .status-p2 {
            background: #fff3bf;
            color: #9c6d1e;
        }

        .status-followup {
            background: #ffe3e3;
            color: #c92a2a;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            header {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="loginScreen">
        <div class="login-container">
            <h1>🎓 Audit Data Dosen Serdos 2026</h1>
            <p style="text-align: center; margin-bottom: 25px; color: #999;">
                Universitas Cordova
            </p>

            <div class="login-tabs">
                <button class="active" onclick="switchTab('login')">Login</button>
                <button onclick="switchTab('register')">Daftar</button>
            </div>

            <!-- LOGIN FORM -->
            <div id="loginForm" class="login-form active">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="loginUsername" placeholder="username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="password">
                </div>
                <button class="btn btn-primary" onclick="login()">Login</button>
                <div id="loginError" class="alert alert-error"></div>
            </div>

            <!-- REGISTER FORM -->
            <div id="registerForm" class="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="registerUsername" placeholder="username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="registerPassword" placeholder="minimal 6 karakter">
                </div>
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="registerName" placeholder="nama anda">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="registerEmail" placeholder="email@cordova.ac.id">
                </div>
                <button class="btn btn-primary" onclick="register()">Daftar</button>
                <div id="registerError" class="alert alert-error"></div>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" style="display: none;">
        <div class="container">
            <header>
                <div>
                    <h1>🎓 Audit Data Dosen Serdos 2026</h1>
                    <p>Universitas Cordova | Google Sheets Version</p>
                </div>
                <div class="user-info">
                    <p id="userEmail" style="font-weight: 600;"></p>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </header>

            <div class="tabs">
                <button class="tab-btn active" data-tab="input">📝 Input Data</button>
                <button class="tab-btn" data-tab="dashboard">📊 Dashboard</button>
                <button class="tab-btn" data-tab="daftar">📋 Daftar Dosen</button>
            </div>

            <!-- TAB INPUT -->
            <div id="input" class="content active">
                <h2>Input Data Dosen</h2>
                <div id="alertInput" class="alert"></div>

                <form id="formInput">
                    <div class="form-row">
                        <div class="form-group">
                            <label>NIDN *</label>
                            <input type="text" id="nidn" required>
                        </div>
                        <div class="form-group">
                            <label>Nama Dosen *</label>
                            <input type="text" id="nama" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Jabatan Akademik *</label>
                            <select id="jabatan" required>
                                <option value="">-- Pilih --</option>
                                <option value="Guru Besar/Profesor">Guru Besar/Profesor</option>
                                <option value="Lektor Kepala">Lektor Kepala</option>
                                <option value="Lektor">Lektor</option>
                                <option value="Asisten Ahli">Asisten Ahli</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>TMT JF *</label>
                            <input type="date" id="tmtJF" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Status Kepegawaian *</label>
                            <select id="statusKepegawaian" required>
                                <option value="">-- Pilih --</option>
                                <option value="Dosen Tetap">Dosen Tetap</option>
                                <option value="Dosen Kontrak">Dosen Kontrak</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>NUPTK *</label>
                            <input type="text" id="nuptk" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>LKD 4 Semester *</label>
                            <select id="lkd" required>
                                <option value="">-- Pilih --</option>
                                <option value="Ada">Ada</option>
                                <option value="Tidak">Tidak Ada</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>PEKERTI/AA *</label>
                            <select id="pekerti" required>
                                <option value="">-- Pilih --</option>
                                <option value="Ada PEKERTI">Ada PEKERTI</option>
                                <option value="Ada AA">Ada AA</option>
                                <option value="Tidak Ada">Belum Ada</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Pendidikan *</label>
                            <select id="pendidikan" required>
                                <option value="">-- Pilih --</option>
                                <option value="S3">S3</option>
                                <option value="S2">S2</option>
                                <option value="S1">S1</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Data Pendidikan Valid *</label>
                            <select id="dataPendidikanValid" required>
                                <option value="">-- Pilih --</option>
                                <option value="Ya">Ya</option>
                                <option value="Perlu Revisi">Perlu Revisi</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Karya Ilmiah *</label>
                            <select id="karyaIlmiah" required>
                                <option value="">-- Pilih --</option>
                                <option value="Ada">Ada</option>
                                <option value="Dalam Proses">Dalam Proses</option>
                                <option value="Tidak Ada">Tidak Ada</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Tugas Belajar *</label>
                            <select id="tugasBelajar" required>
                                <option value="">-- Pilih --</option>
                                <option value="Tidak TB">Tidak TB</option>
                                <option value="TB Sambil Bekerja">TB Sambil Bekerja</option>
                                <option value="TB Penuh">TB Penuh</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Catatan</label>
                        <textarea id="catatan" rows="3"></textarea>
                    </div>

                    <div class="btn-group">
                        <button type="reset" class="btn btn-secondary">Reset</button>
                        <button type="submit" class="btn btn-primary">💾 Simpan Data</button>
                    </div>
                </form>
            </div>

            <!-- TAB DASHBOARD -->
            <div id="dashboard" class="content">
                <h2>Dashboard</h2>

                <div class="dashboard">
                    <div class="card">
                        <h3>Total Dosen</h3>
                        <div class="number" id="totalDosen">0</div>
                    </div>
                    <div class="card p1">
                        <h3>P1: Eligible</h3>
                        <div class="number" id="countP1">0</div>
                    </div>
                    <div class="card p2">
                        <h3>P2: Bersyarat</h3>
                        <div class="number" id="countP2">0</div>
                    </div>
                    <div class="card followup">
                        <h3>Follow-up</h3>
                        <div class="number" id="countFollowUp">0</div>
                    </div>
                </div>
            </div>

            <!-- TAB DAFTAR -->
            <div id="daftar" class="content">
                <h2>Daftar Dosen</h2>

                <div style="margin-bottom: 20px;">
                    <input type="text" id="searchInput" placeholder="Cari nama dosen..." style="padding: 10px; width: 300px; border: 1px solid #ddd; border-radius: 5px;">
                </div>

                <table id="tableDosen" style="display: none;">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>NIDN</th>
                            <th>Nama</th>
                            <th>Jabatan</th>
                            <th>Masa Kerja</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyDosen"></tbody>
                </table>

                <div id="emptyMessage" style="text-align: center; color: #999; padding: 40px;">
                    Belum ada data dosen
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============ CONFIGURATION ============
        // ⚠️ GANTI DENGAN URL APPS SCRIPT ANDA!
        const APPS_SCRIPT_URL = "YOUR_APPS_SCRIPT_URL";
        
        let currentUser = null;
        let allData = [];

        // ============ AUTHENTICATION ============
        function switchTab(tab) {
            document.querySelectorAll('.login-tabs button').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.login-form').forEach(f => f.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab === 'login' ? 'loginForm' : 'registerForm').classList.add('active');
        }

        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showError('loginError', 'Username dan password harus diisi');
                return;
            }

            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'LOGIN',
                        username: username,
                        password: password
                    })
                });

                const result = await response.json();

                if (result.success) {
                    currentUser = result.user;
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('mainApp').style.display = 'block';
                    document.getElementById('userEmail').textContent = currentUser.email;
                    loadData();
                } else {
                    showError('loginError', result.message);
                }
            } catch(error) {
                showError('loginError', 'Error: ' + error.message);
            }
        }

        async function register() {
            const username = document.getElementById('registerUsername').value;
            const password = document.getElementById('registerPassword').value;
            const nama = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;

            if (!username || !password || !nama || !email) {
                showError('registerError', 'Semua field harus diisi');
                return;
            }

            if (password.length < 6) {
                showError('registerError', 'Password minimal 6 karakter');
                return;
            }

            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'CREATE_USER',
                        username: username,
                        password: password,
                        nama: nama,
                        email: email,
                        role: 'user'
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showError('registerError', '✅ Akun berhasil dibuat! Silakan login.');
                    setTimeout(() => {
                        document.getElementById('registerUsername').value = '';
                        document.getElementById('registerPassword').value = '';
                        document.getElementById('registerName').value = '';
                        document.getElementById('registerEmail').value = '';
                        switchTab('login');
                    }, 1500);
                } else {
                    showError('registerError', result.message);
                }
            } catch(error) {
                showError('registerError', 'Error: ' + error.message);
            }
        }

        function logout() {
            currentUser = null;
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
        }

        // ============ DATA OPERATIONS ============
        async function addDosen(data) {
            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'ADD_DOSEN',
                        data: data
                    })
                });

                const result = await response.json();
                return result;
            } catch(error) {
                return { success: false, message: 'Error: ' + error.message };
            }
        }

        async function loadData() {
            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'GET_ALL_DOSEN'
                    })
                });

                const result = await response.json();

                if (result.success) {
                    allData = result.data;
                    displayDaftar(allData);
                    updateDashboard();
                }
            } catch(error) {
                console.error('Error loading data:', error);
            }
        }

        function displayDaftar(data) {
            if (data.length === 0) {
                document.getElementById('tableDosen').style.display = 'none';
                document.getElementById('emptyMessage').style.display = 'block';
                return;
            }

            let html = '';
            data.forEach((d, i) => {
                const statusClass = d.Eligibilitas === 'P1' ? 'status-p1' : 
                                   d.Eligibilitas === 'P2' ? 'status-p2' : 'status-followup';
                html += `
                    <tr>
                        <td>${i + 1}</td>
                        <td>${d.NIDN}</td>
                        <td>${d.Nama}</td>
                        <td>${d.Jabatan}</td>
                        <td>${d['Masa Kerja']} tahun</td>
                        <td><span class="status-badge ${statusClass}">${d.Eligibilitas}</span></td>
                    </tr>
                `;
            });

            document.getElementById('tbodyDosen').innerHTML = html;
            document.getElementById('tableDosen').style.display = 'table';
            document.getElementById('emptyMessage').style.display = 'none';
        }

        async function updateDashboard() {
            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'GET_STATS'
                    })
                });

                const result = await response.json();

                if (result.success) {
                    const stats = result.data;
                    document.getElementById('totalDosen').textContent = stats.total;
                    document.getElementById('countP1').textContent = stats.p1;
                    document.getElementById('countP2').textContent = stats.p2;
                    document.getElementById('countFollowUp').textContent = stats.followup;
                }
            } catch(error) {
                console.error('Error updating dashboard:', error);
            }
        }

        // ============ FORM SUBMISSION ============
        document.getElementById('formInput').addEventListener('submit', async (e) => {
            e.preventDefault();

            const data = {
                nidn: document.getElementById('nidn').value,
                nama: document.getElementById('nama').value,
                jabatan: document.getElementById('jabatan').value,
                tmtJF: document.getElementById('tmtJF').value,
                statusKepegawaian: document.getElementById('statusKepegawaian').value,
                nuptk: document.getElementById('nuptk').value,
                lkd: document.getElementById('lkd').value,
                pekerti: document.getElementById('pekerti').value,
                pendidikan: document.getElementById('pendidikan').value,
                dataPendidikanValid: document.getElementById('dataPendidikanValid').value,
                karyaIlmiah: document.getElementById('karyaIlmiah').value,
                tugasBelajar: document.getElementById('tugasBelajar').value,
                catatan: document.getElementById('catatan').value,
                inputBy: currentUser.email
            };

            const result = await addDosen(data);

            if (result.success) {
                showAlert('alertInput', `✅ ${result.message}`, 'success');
                document.getElementById('formInput').reset();
                loadData();
            } else {
                showAlert('alertInput', '❌ ' + result.message, 'error');
            }
        });

        // ============ TAB NAVIGATION ============
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(tab).classList.add('active');
            });
        });

        // ============ SEARCH ============
        document.getElementById('searchInput').addEventListener('keyup', (e) => {
            const keyword = e.target.value.toLowerCase();
            const filtered = allData.filter(d => d.Nama.toLowerCase().includes(keyword));
            displayDaftar(filtered);
        });

        // ============ UTILITIES ============
        function showError(elementId, message) {
            const element = document.getElementById(elementId);
            element.innerHTML = message;
            element.classList.add('show');
            if (message.includes('✅')) {
                setTimeout(() => element.classList.remove('show'), 2000);
            }
        }

        function showAlert(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.innerHTML = message;
            element.className = `alert show alert-${type}`;
            setTimeout(() => element.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
